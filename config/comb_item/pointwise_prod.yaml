# RUNTIME ==========
seed: 42


# STRATEGY ==========
strategy: pointwise


# DATA ==========
data:
  name: movielens
  entity:
    num_users: 610
    num_items: 9724


# MODEL ==========
model:
  name: comb_item
  params:
    embedding_dim: 32
    dist: lognormal
    hyper_approx: 0.1
    hyper_prior: 1.0
    beta: 0.5
    comb: prod


# PIPELINE PACKAGE ==========
split:
  ratio:
    trn: 8
    val: 1
    tst: 1
  min_rating: 1
  filter_by: user

dataloader:
  negatives:
    ratio:
      opt: 4
      msr: 99
  batch_size: 256
  shuffle: True

histories:
  selector:
    name: tfidf
    params:
      max_hist: 400


# TRAINER PACKAGE ==========
trainer:
  num_epochs: 100

loss:
  name: bce
  params:

optimizer:
  name: adamw
  params:
    lr: 0.001
    weight_decay: 0.00001

annealer:
  name: linear
  params:
    min: 0.0
    max: 0.1
    warmup: 10

monitor:
  metric: ndcg
  k: 10
  delta: 0.001
  patience: 5
  warmup: 10


# EVALUATOR PACKAGE ==========
evaluator:
  cutoff: [5, 10, 15, 20, 25, 50]
